name: Send Approved Applications
on: {workflow_dispatch:}
permissions: {contents: read}
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: "22", cache: npm}
      - run: npm ci
      - run: npm run send:approved
        env: {HOSTINGER_MCP_TOKEN: ${{ secrets.HOSTINGER_MCP_TOKEN }}}
      - if: always()
        uses: actions/upload-artifact@v4
        with: {name: application-send-report, path: reports/send-report.md}
